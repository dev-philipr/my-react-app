<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle (Mint) -->
  <circle cx="40" cy="50" r="30" fill="none" stroke="#6ee7b7" stroke-width="6"/>
  <!-- Overlapping Circle (Teal with Opacity) -->
  <circle cx="60" cy="50" r="30" fill="#0d9488" fill-opacity="0.2" stroke="#0d9488" stroke-width="6"/>
  <!-- The Center Focus (Solid Pop) -->
  <circle cx="50" cy="50" r="8" fill="#10b981"/>
</svg>
